name: "[dev] Release"

on:
 push:
  branches:
   - dev
  paths:
   - "package.json"

jobs:
 Build:
  uses: ./.github/workflows/build.yml

 Release:
  name: Release dev on GitHub
  needs: Build
  runs-on: ubuntu-latest
  steps:
   - name: Download All Artifacts
     uses: actions/download-artifact@v4
     with:
      name: luna-artifacts
      path: ./dist/

   - name: Get version from package.json
     run: |
      VERSION=$(jq -r .version ./dist/package.json)
      echo "VERSION=${VERSION}" >> $GITHUB_ENV

   - name: Publish dev release on GitHub
     uses: marvinpinto/action-automatic-releases@latest
     with:
      repo_token: ${{ secrets.GITHUB_TOKEN }}
      automatic_release_tag: ${{ env.VERSION }}
      prerelease: true
      title: Release ${{ env.VERSION }}
      files: ./dist/luna.zip

 Nix-Update-Linux:
  name: Update Linux Nix hashes
  needs: Release
  runs-on: ubuntu-latest
  steps:
   - uses: actions/checkout@v4

   - name: Get version from package.json
     run: |
      VERSION=$(jq -r .version package.json)
      echo "VERSION=${VERSION}" >> $GITHUB_ENV

   - uses: cachix/install-nix-action@v18
   - uses: workflow/nix-shell-action@v3
     with:
      packages: nix-update
      script: |
       nix-update --flake injection-linux --version=${{ env.VERSION }}

   - uses: stefanzweifel/git-auto-commit-action@v5
     with:
      commit_message: "nix: update Linux injection hash for ${{ env.VERSION }}"

 Nix-Update-Darwin:
  name: Update Darwin Nix hashes
  needs: Nix-Update-Linux
  runs-on: macos-latest
  steps:
   - uses: actions/checkout@v4
     with:
      ref: ${{ github.ref }}

   - name: Pull latest changes
     run: git pull --rebase

   - name: Get version from package.json
     run: |
      VERSION=$(jq -r .version package.json)
      echo "VERSION=${VERSION}" >> $GITHUB_ENV

   - uses: cachix/install-nix-action@v18
   - uses: workflow/nix-shell-action@v3
     with:
      packages: nix-update
      script: |
       nix-update --flake injection-darwin --version=${{ env.VERSION }}
       nix-update --flake darwin-package --version=skip

   - uses: stefanzweifel/git-auto-commit-action@v5
     with:
      commit_message: "nix: update Darwin injection and package hashes for ${{ env.VERSION }}"
