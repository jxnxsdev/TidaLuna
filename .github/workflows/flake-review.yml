name: Flake Review

on:
 pull_request:
  branches: [master, dev]

concurrency:
 group: ${{ inputs.concurrency-group || format('{0}-{1}', github.workflow, github.ref) }}
 cancel-in-progress: true

permissions:
 contents: read
 pull-requests: write

jobs:
 review:
  uses: ojsef39/flake-review/.github/workflows/flake-review-reusable.yml@0.1.2
  with:
   # https://github.com/ojsef39/flake-review/blob/main/.github/workflows/flake-review-reusable.yml
   concurrency-group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
   flake-review-ref: "0.1.2"
   packages: "default"
   matrix: '[{"runner":"macos-latest","systems":"aarch64-darwin","name":"darwin"},{"runner":"ubuntu-latest","systems":"x86_64-linux","name":"linux"}]'
